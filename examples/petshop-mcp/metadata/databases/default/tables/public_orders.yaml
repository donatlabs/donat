table:
  name: orders
  schema: public
# Per-column documentation for the MCP `describe_table` tool.
configuration:
  column_config:
    id:
      comment: >-
        Primary key of the order: an auto-generated integer order number.
        Referenced by order_item.order_id.
    customer_id:
      comment: >-
        Foreign key to customer.id (TEXT) — the shopper who placed this order.
        Use the `customer` object relationship to read the buyer's details.
    status:
      comment: >-
        Fulfilment status. Exactly one of: "placed" (default for new orders),
        "approved", "shipped", "delivered", or "cancelled".
    created_at:
      comment: >-
        Timestamp with time zone when the order was created (defaults to now()).
        Use it to sort or filter orders by recency.
object_relationships:
  - name: customer
    using:
      foreign_key_constraint_on: customer_id
array_relationships:
  - name: items
    using:
      foreign_key_constraint_on:
        column: order_id
        table:
          name: order_item
          schema: public
# A shopper places orders for themselves: customer_id is forced to their own
# session id by the preset, and the check rejects anything else.
insert_permissions:
  - role: customer
    permission:
      check:
        customer_id:
          _eq: X-Donat-User-Id
      set:
        customer_id: X-Donat-User-Id
      columns:
        - status
# A shopper reads only their own orders; staff read all of them.
select_permissions:
  - role: customer
    permission:
      columns: "*"
      filter:
        customer_id:
          _eq: X-Donat-User-Id
  - role: staff
    permission:
      columns: "*"
      filter: {}
# Order fulfilment (status transitions) belongs to staff.
update_permissions:
  - role: staff
    permission:
      columns:
        - status
      filter: {}
      check: {}
delete_permissions:
  - role: staff
    permission:
      filter: {}
