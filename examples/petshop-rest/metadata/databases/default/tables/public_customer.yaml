table:
  name: customer
  schema: public
# Per-column documentation. Each comment is surfaced as the column field's
# `description` in GraphQL introspection and in the MCP `describe_table` tool.
configuration:
  column_config:
    id:
      comment: Unique identifier for the customer.
    name:
      comment: The customer's full display name.
    email:
      comment: Contact email address; used for order confirmations.
array_relationships:
  - name: orders
    using:
      foreign_key_constraint_on:
        column: customer_id
        table:
          name: orders
          schema: public
# A shopper sees only their own profile; staff see every customer.
select_permissions:
  - role: customer
    permission:
      columns:
        - id
        - name
        - email
      filter:
        id:
          _eq: X-Donat-User-Id
  - role: staff
    permission:
      columns: "*"
      filter: {}
# A shopper may edit their own profile (id is fixed by the row filter + check).
update_permissions:
  - role: customer
    permission:
      columns:
        - name
        - email
      filter:
        id:
          _eq: X-Donat-User-Id
      check:
        id:
          _eq: X-Donat-User-Id
