name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Tests (unit + conformance)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 15432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Conformance harness: admin connection for per-suite databases.
      PG_URL: postgresql://postgres:postgres@127.0.0.1:15432/postgres
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Build the engine binary first: conformance suites spawn it.
      - name: Build engine
        run: cargo build --workspace --bins
      - name: Unit and snapshot tests
        run: cargo test --workspace --exclude donat-conformance
      - name: Conformance suite
        run: cargo test -p donat-conformance
        env:
          RUST_BACKTRACE: "1"

  go-sdk:
    name: Go SDK (cgo-free, tests)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 15432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: sdk/go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: sdk/go/go.sum
      # The hard packaging constraint (specs/003): the SDK must be
      # go-get-able and statically buildable with no cgo.
      - name: Build with cgo disabled
        run: CGO_ENABLED=0 go build ./...
      - name: Test (unit + integration + conformance subset)
        run: CGO_ENABLED=0 go test ./...
        env:
          # DONAT_TEST_PG enables integration tests (executor, handler, conformance
          # subset) against the postgres service defined above. The service is mapped
          # to host port 15432 so the default pgTestDSN() works unchanged.
          DONAT_TEST_PG: "1"
      - name: Vet
        run: go vet ./...
      - name: gofmt (must be clean)
        run: test -z "$(gofmt -l .)" || { gofmt -l .; exit 1; }

  audit:
    name: Security advisories (cargo-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  artifacts:
    name: Build artifact (${{ matrix.target.name }})
    needs: test
    strategy:
      matrix:
        target:
          - name: linux-x86_64
            runner: ubuntu-latest
          - name: macos-aarch64
            runner: macos-latest
    runs-on: ${{ matrix.target.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release --bin donat
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: donat-${{ matrix.target.name }}
          path: target/release/donat
          if-no-files-found: error
