name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Unit and snapshot tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Unit and snapshot tests
        run: cargo test --workspace --exclude donat-conformance

  backend-core:
    name: Shared conformance (${{ matrix.backend }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: postgres
          - backend: sqlite
          - backend: mysql
          - backend: clickhouse
    env:
      CONF_BACKEND: ${{ matrix.backend }}
      PG_URL: postgresql://postgres:postgres@127.0.0.1:15432/postgres
      MYSQL_URL: mysql://root:root@127.0.0.1:13306/mysql
      CLICKHOUSE_URL: http://donat:donat@127.0.0.1:18123
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Start Postgres
        if: matrix.backend == 'postgres'
        run: docker run -d --name donat-postgres -e POSTGRES_PASSWORD=postgres -p 15432:5432 postgis/postgis:16-3.4
      - name: Start MySQL
        if: matrix.backend == 'mysql'
        run: docker run -d --name donat-mysql -e MYSQL_ROOT_PASSWORD=root -p 13306:3306 mysql:8.4
      - name: Start ClickHouse
        if: matrix.backend == 'clickhouse'
        run: docker run -d --name donat-clickhouse -e CLICKHOUSE_USER=donat -e CLICKHOUSE_PASSWORD=donat -e CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1 -p 18123:8123 clickhouse/clickhouse-server:25.8
      - name: Wait for database
        if: matrix.backend != 'sqlite'
        shell: bash
        run: |
          for attempt in {1..60}; do
            case "$CONF_BACKEND" in
              postgres) pg_isready -h 127.0.0.1 -p 15432 -U postgres && exit 0 ;;
              mysql) docker exec donat-mysql mysqladmin ping -uroot -proot --silent && exit 0 ;;
              clickhouse) curl --fail --silent --user donat:donat http://127.0.0.1:18123/ping && exit 0 ;;
            esac
            sleep 2
          done
          docker logs "donat-$CONF_BACKEND"
          exit 1
      - name: Build engine
        run: cargo build -p donat-server --bin donat
      - name: Matrix registry and manifest guards
        run: cargo test -p donat-conformance --lib
      - name: Shared backend contract
        run: cargo test -p donat-conformance --test backend_matrix -- --test-threads=1 --nocapture
        env:
          RUST_BACKTRACE: "1"
      - name: Full Postgres reference conformance
        if: matrix.backend == 'postgres'
        run: cargo test -p donat-conformance -- --test-threads=4
        env:
          RUST_BACKTRACE: "1"

  backend-core-gate:
    name: Conformance matrix
    if: always()
    needs: backend-core
    runs-on: ubuntu-latest
    steps:
      - name: Require every backend
        run: test '${{ needs.backend-core.result }}' = success

  audit:
    name: Security advisories (cargo-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      # Run cargo-audit directly instead of rustsec/audit-check: the latter
      # creates a GitHub check-run, which fails ("Resource not accessible by
      # integration") unless the workflow is granted `checks: write`.
      #
      # `--deny warnings` keeps the gate strict: any vulnerability or
      # informational advisory (unsound, unmaintained, yanked) fails the job.
      - name: cargo audit
        run: cargo audit --deny warnings

  artifacts:
    name: Build artifact (${{ matrix.target.name }})
    needs: [test, backend-core-gate]
    strategy:
      matrix:
        target:
          - name: linux-x86_64
            runner: ubuntu-latest
          - name: macos-aarch64
            runner: macos-latest
    runs-on: ${{ matrix.target.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release --bin donat
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: donat-${{ matrix.target.name }}
          path: target/release/donat
          if-no-files-found: error
