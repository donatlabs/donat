description: Mutations are not exposed to an inherited role
url: /v1/graphql
headers:
  X-Donat-Role: inherited_user
  X-Donat-User-Id: '3'
status: 200
query:
  query: |
    mutation {
      insert_authors(objects: {name: "J.K.Rowling", phone: "1122334455"}) {
        affected_rows
      }
    }
response:
  errors:
    - extensions:
        path: $
        code: validation-failed
      message: no mutations exist
