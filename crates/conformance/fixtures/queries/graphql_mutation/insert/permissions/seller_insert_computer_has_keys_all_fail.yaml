description: Inserts computer specs without all the required keys (error)
url: /v1alpha1/graphql
# donat: Donat fixtures are inconsistent here; we return 200 everywhere (see COVERAGE.md)
status: 200
response:
  errors:
  - extensions:
      path: $.selectionSet.insert_computer.args.objects
      code: permission-error
    message: check constraint of an insert/update permission has failed
headers:
  X-Donat-Role: seller
  X-Donat-Spec-Required-Keys: |-
    {processor,display,memory,warranty}
query:
  variables:
    spec:
      processor: AMD
      display: 16" FHD
      memory: 16 GB DDR4
  query: |
    mutation insert_computer($spec: jsonb) {
      insert_computer (
        objects: [
          {
            name: "Computer1",
            spec: $spec
          },
          ],
      ) {
        affected_rows
        returning {
          name
          spec
          }
        }
    }
