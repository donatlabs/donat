description: Insert into resident table with non insertable columns (Error)
url: /v1/graphql
status: 200
headers:
  X-Donat-Role: infant
  X-Donat-Infant-Id: '1'
  X-Donat-Infant-Name: 'Bittu'
query:
  query: |
    mutation {
      insert_resident(
        objects: [
          {
            age: 3
            is_user: true
          }
        ]
      ){
        affected_rows
        returning{
          id
          name
          age
          is_user
        }
      }
    }
