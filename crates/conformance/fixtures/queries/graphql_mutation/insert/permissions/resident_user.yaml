description: Insert into resident table where name is taken from header value
url: /v1/graphql
status: 200
headers:
  X-Donat-Role: user
  X-Donat-Resident-Id: '4'
  X-Donat-Resident-Name: Clarke
response:
  data:
    insert_resident:
      affected_rows: 1
      returning:
      - id: 4
        name: Clarke
        age: 25
        is_user: true
query:
  query: |
    mutation {
      insert_resident(
        objects: [
          {
            id: 4
            age: 25
          }
        ]
      ){
        affected_rows
        returning{
          id
          name
          age
          is_user
        }
      }
    }
