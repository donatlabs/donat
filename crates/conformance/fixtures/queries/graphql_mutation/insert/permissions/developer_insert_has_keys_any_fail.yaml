description: Inserts computer specs with atleast one of the required keys
url: /v1alpha1/graphql
# dist-api: Hasura fixtures are inconsistent here; we return 200 everywhere (see COVERAGE.md)
status: 200
response:
  errors:
  - extensions:
      path: $.selectionSet.insert_computer.args.objects
      code: permission-error
    message: check constraint of an insert/update permission has failed
headers:
  X-Hasura-Role: developer
  X-Hasura-Spec-Keys: |-
    {display,memory,warranty}
query:
  variables:
    spec:
      processor: AMD
  query: |
    mutation insert_computer($spec: jsonb) {
      insert_computer (
        objects: [
          {
            name: "Computer1",
            spec: $spec
          },
          ],
      ) {
        affected_rows
        returning {
          name
          spec
          }
        }
    }
