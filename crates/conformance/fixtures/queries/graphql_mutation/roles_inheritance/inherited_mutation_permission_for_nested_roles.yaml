- description: Delete mutation for a nested role
  url: /v1/graphql
  headers:
    X-Donat-Role: author_editor_publisher
    X-Donat-Editor-Id: '1'
    X-Donat-Author-Id: '1'
  query:
    query: |
      mutation {
        delete_articles (where: {id: {_eq: 1}}) {
          affected_rows
        }
      }
  status: 200
  response:
    data:
      delete_articles:
        affected_rows: 1
