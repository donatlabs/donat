description: Trying to update name of author whose id /= X-Donat-User-Id. This shouldn't mutate any data as permission filter condition is not met.
url: /v1/graphql
status: 200
headers:
  X-Donat-Role: user
  X-Donat-User-Id: '1'
query:
  query: |
    mutation {
      update_author(
        where: {id: {_eq: 2}}
        _set: {name: "Author 1 updated"}
      ){
        affected_rows
        returning{
          id
          name
          articles{
            id
            title
            content
          }
        }
      }
    }
response:
  data:
    update_author:
      affected_rows: 0
      returning: []
