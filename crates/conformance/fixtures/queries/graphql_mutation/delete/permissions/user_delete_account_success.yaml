description: Delete data from account table as a user who is admin
url: /v1/graphql
status: 200
headers:
  X-Donat-Role: user
  X-Donat-User-Id: '2'
response:
  data:
    delete_account:
      affected_rows: 1
query:
  query: |
    mutation{
      delete_account(
        where: {account_no: {_eq: 1}}
      ){
        affected_rows
      }
    }
