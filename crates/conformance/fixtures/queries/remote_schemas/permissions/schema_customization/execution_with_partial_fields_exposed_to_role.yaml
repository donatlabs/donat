# Ported from tests-py; the final admin (no-role) re-run step is trimmed
# (no admin role). See tests/donat/COVERAGE.md.
- description: query the remote schema with only fields that have been exposed to the role 'user'
  url: /v1/graphql
  status: 200
  headers:
    X-Donat-Role: user
  query:
    query: |
      query {
        my_remote_schema {
          user (user_id: 1) {
            foo_user_id
          }
        }
      }
  response:
    data:
      my_remote_schema:
        user:
          foo_user_id: 1

- description: query the remote schema with only fields that have been exposed to the role 'user' using a fragment
  url: /v1/graphql
  status: 200
  headers:
    X-Donat-Role: user
  query:
    query: |
      query {
        my_remote_schema {
          user (user_id: 1) {
            ... userFrag
          }
        }
      }

      fragment userFrag on FooUser {
        foo_user_id
      }
  response:
    data:
      my_remote_schema:
        user:
          foo_user_id: 1

- description: query the remote schema with only fields that have been exposed to the role 'user' using an inline fragment
  url: /v1/graphql
  status: 200
  headers:
    X-Donat-Role: user
  query:
    query: |
      query {
        my_remote_schema {
          user (user_id: 1) {
            ... on FooUser {
              foo_user_id
            }
          }
        }
      }
  response:
    data:
      my_remote_schema:
        user:
          foo_user_id: 1

- description: query the remote schema with fields that have not been exposed to the role 'user'
  url: /v1/graphql
  status: 200
  headers:
    X-Donat-Role: user
  query:
    query: |
      query {
        my_remote_schema {
          hello
          user (user_id: 1) {
            foo_user_id
            foo_gimmeText(text: "hello")
          }
        }
      }
  response:
    errors:
      - extensions:
          path: $.selectionSet.my_remote_schema.selectionSet.user.selectionSet.foo_gimmeText
          code: validation-failed
        message: "field 'foo_gimmeText' not found in type: 'FooUser'"

