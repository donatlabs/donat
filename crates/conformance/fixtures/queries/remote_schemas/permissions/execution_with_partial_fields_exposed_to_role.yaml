# Ported from tests-py. The original's third step re-runs the query as the
# admin role (no X-Donat-Role) — out of scope (this engine has no admin role).
# Trimmed to the two role-scoped steps. See tests/donat/COVERAGE.md.
- description: query the remote schema with only fields that have been exposed to the role 'user'
  url: /v1/graphql
  status: 200
  headers:
    X-Donat-Role: user
  query:
    query: |
       query {
         user (user_id: 1) {
           user_id
         }
       }
  response:
    data:
      user:
        user_id: 1

- description: query the remote schema with fields that have not been exposed to the role 'user'
  url: /v1/graphql
  status: 200
  headers:
    X-Donat-Role: user
  query:
    query: |
       query {
         hello
         user (user_id: 1) {
           user_id
           gimmeText(text: "hello")
         }
       }
  response:
    errors:
    - extensions:
        path: $.selectionSet.user.selectionSet.gimmeText
        code: validation-failed
      message: "field 'gimmeText' not found in type: 'User'"
