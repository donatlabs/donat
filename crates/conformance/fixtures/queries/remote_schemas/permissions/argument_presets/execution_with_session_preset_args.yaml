- description: "query with field having session argument preset"
  url: /v1/graphql
  status: 200
  headers:
    X-Donat-Role: user
    X-Donat-User-Id: "1"
  query:
    query: |
      {
        user {
          user_id
        }
      }
  response:
    data:
      user:
        user_id: 1

- description: "throw error when an expected session variable is not provided"
  url: /v1/graphql
  status: 200
  headers:
    X-Donat-Role: user
  query:
    query: |
      {
        user {
          user_id
        }
      }
  response:
    errors:
    - extensions:
        code: not-found
        path: $
      message: '"x-donat-user-id" session variable expected, but not found'

- description: "throw error when the session variable cannot be coerced into the appropriate type"
  url: /v1/graphql
  status: 200
  headers:
    X-Donat-Role: user
    X-Donat-User-Id: randomid123
  query:
    query: |
      {
        user {
          user_id
        }
      }
  response:
    errors:
    - extensions:
        code: coercion-error
        path: $
      message: '"randomid123" cannot be coerced into an Int value'
