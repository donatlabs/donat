description: Fetch student names with tutor role with an offset given via donat session
url: /v1/graphql
status: 200
headers:
  X-Donat-Role: tutor_session
  X-Donat-Offset-Marks: '10'
query:
  query: |
    query {
      student_marks{
        name
        total_marks
        total_marks_offset
      }
    }
response:
  data:
    student_marks:
    - name: blake
      total_marks: 233
      total_marks_offset: 223
    - name: leonel
      total_marks: 268
      total_marks_offset: 258
