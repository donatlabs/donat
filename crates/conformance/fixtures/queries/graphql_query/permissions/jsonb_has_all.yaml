- description: User can query jsonb values which satisfies filter in select permission with array session variable
  url: /v1/graphql
  status: 200
  headers:
    X-Donat-Role: user5
    X-Donat-Json-required-keys: |-
      {name,age}
  response:
    data:
      jsonb_table:
      - id: 1
        jsonb_col:
          name: Donat
          age: 7
  query:
    query: |
      query {
        jsonb_table{
          id
          jsonb_col
        }
      }

- description: User can query jsonb values which satisfies filter in select permission with array session variable
  url: /v1/graphql
  status: 200
  headers:
    X-Donat-Role: user5
    X-Donat-Protected-Jsons: |-
      {}
  response:
    data:
      jsonb_table: []
  query:
    query: |
      query {
        jsonb_table{
          id
          jsonb_col
        }
      }
