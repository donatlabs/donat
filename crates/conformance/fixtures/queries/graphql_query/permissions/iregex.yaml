- description: user can only select artists having name matching X-Donat-iregex-artists
  url: /v1/graphql
  status: 200
  headers:
    X-Donat-Role: user_iregex
    X-Donat-iregex-artists: "(.*ak)|(.*lla)"
  response:
    data:
      Artist:
        - name: Akon
        - name: Camilla
  query:
    query: |
      query {
        Artist (order_by: {name: asc}) {
          name
        }
      }
