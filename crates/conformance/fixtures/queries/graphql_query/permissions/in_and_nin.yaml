- description: user can only select free artists
  url: /v1/graphql
  status: 200
  headers:
    X-Donat-Role: free_user_in
    X-Donat-free-artists: "{Camilla,DSP}"
  response:
    data:
      Artist:
      - name: Camilla
      - name: DSP
  query:
    query: |
      query {
        Artist (order_by: {name: asc}) {
          name
        }
      }

- description: user can only select free artists (no free artists)
  url: /v1/graphql
  status: 200
  headers:
    X-Donat-Role: free_user_in
    X-Donat-free-artists: "{}"
  response:
    data:
      Artist: []
  query:
    query: |
      query {
        Artist (order_by: {name: asc}) {
          name
        }
      }

- description: user can only select non premium artists
  url: /v1/graphql
  status: 200
  headers:
    X-Donat-Role: free_user_nin
    X-Donat-premium-artists: "{Akon}"
  response:
    data:
      Artist:
      - name: Camilla
      - name: DSP
  query:
    query: |
      query {
        Artist (order_by: {name: asc}) {
          name
        }
      }

- description: user can only select non premium artists (no premium artists
  url: /v1/graphql
  status: 200
  headers:
    X-Donat-Role: free_user_nin
    X-Donat-premium-artists: "{}"
  response:
    data:
      Artist:
      - name: Akon
      - name: Camilla
      - name: DSP
  query:
    query: |
      query {
        Artist (order_by: {name: asc}) {
          name
        }
      }
