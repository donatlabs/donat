description: User can query geometry values which satisfies filter in select permission using session variables
url: /v1/query
status: 200
headers:
  X-Donat-Role: user2
  X-Donat-Has-Key: age
response:
- id: 1
  jsonb_col:
    name: Donat
    age: 7
query:
  type: select
  args:
    table: jsonb_table
    columns:
    - id
    - jsonb_col
