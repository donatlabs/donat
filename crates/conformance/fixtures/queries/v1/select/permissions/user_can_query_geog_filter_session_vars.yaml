description: Query data from geog_table using st_d_within and session vars
url: /v1/query
status: 200
headers:
  X-Donat-Role: postgis_user2
  X-Donat-Geog-Sph: 'false'
  X-Donat-Geog-Dist: '1000000'
  X-Donat-Geog-From: '{"crs": {"type": "name", "properties": {"name": "urn:ogc:def:crs:EPSG::4326"}}, "type": "Point", "coordinates": [1, 50]}'
response:
- name: London
- name: Paris
query:
  type: select
  args:
    table: geog_table
    columns:
    - name
