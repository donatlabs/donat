- description: Query bid prices more than action price
  url: /v1/graphql
  status: 200
  headers:
    X-Donat-Role: user
  response:
    errors:
    - extensions:
        path: $
        code: not-found
      message: 'missing session variable: "x-donat-custom"'

  query:
    query: |
      query {
        hge_tests_test_t1 {
          c1, c2
        }
      }

