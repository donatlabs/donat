description: A table with no permission for the role is not exposed (table-level)
url: /v1/graphql
status: 200
headers:
  X-Donat-Role: user
  X-Donat-User-Id: '1'
response:
  errors:
    - extensions:
        path: $.selectionSet.audit_log
        code: validation-failed
      message: "field 'audit_log' not found in type: 'query_root'"
query:
  query: |
    query {
      audit_log {
        id
        message
      }
    }
