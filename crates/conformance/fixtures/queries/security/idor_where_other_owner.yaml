description: Filtering by another owner cannot bypass the row permission (filter is ANDed)
url: /v1/graphql
status: 200
headers:
  X-Donat-Role: user
  X-Donat-User-Id: '1'
query:
  query: |
    query {
      account(where: {owner: {_eq: "2"}}) {
        id
        owner
      }
    }
response:
  data:
    account: []
