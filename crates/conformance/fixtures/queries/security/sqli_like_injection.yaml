description: An injection payload in an _ilike pattern is escaped, matching nothing
url: /v1/graphql
status: 200
headers:
  X-Donat-Role: user
  X-Donat-User-Id: '1'
query:
  query: |
    query {
      account(where: {label: {_ilike: "%' OR '1'='1%"}}) {
        id
      }
    }
response:
  data:
    account: []
