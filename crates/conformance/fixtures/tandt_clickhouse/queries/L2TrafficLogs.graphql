query L2TrafficLogs(
  $limit: Int!
  $offset: Int!
  $where: logs_l2_traffic_bool_exp
  $order_by: [logs_l2_traffic_order_by!]
) {
  logs_l2_traffic(
    limit: $limit
    offset: $offset
    where: $where
    order_by: $order_by
  ) {
    ...L2TrafficLogFragment
  }
  logs_l2_traffic_aggregate(where: $where) {
    aggregate {
      count
    }
  }
}

fragment L2TrafficLogFragment on logs_l2_traffic {
  event_time
  equipment_id
  device_id
  direction
  data_ascii
  data_hex
  data_len
}
