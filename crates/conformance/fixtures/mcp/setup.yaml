type: bulk
args:

- type: run_sql
  args:
    sql: |
      CREATE TABLE pet (
        id INT PRIMARY KEY,
        name TEXT NOT NULL,
        status TEXT NOT NULL
      );

      INSERT INTO pet (id, name, status) VALUES
        (1, 'Rex', 'available'),
        (2, 'Milo', 'pending'),
        (3, 'Luna', 'available');

      -- A public table whose own name contains an underscore. Its Donat base
      -- name is `order_item`; resolving it must NOT split on the underscore
      -- into schema `order` / table `item` (the previous mis-resolution).
      CREATE TABLE order_item (
        id INT PRIMARY KEY,
        label TEXT NOT NULL
      );

      INSERT INTO order_item (id, label) VALUES
        (1, 'first'),
        (2, 'second');

      -- Write-only MCP table: `writer` may insert rows but has no select
      -- permission, so MCP must discover the insert operation without leaking
      -- columns through describe_table/query, and mutation tools must request
      -- affected_rows only (no returning).
      CREATE TABLE audit_log (
        id INT PRIMARY KEY,
        message TEXT NOT NULL
      );

- type: track_table
  args:
    schema: public
    name: pet
    configuration:
      column_config:
        status:
          comment: Availability status of the pet

- type: create_select_permission
  args:
    table: pet
    role: user
    permission:
      filter: {}
      columns: '*'

# A column-restricted role: may select only id and name. Used to verify that
# describe_table reports columns/selectable filtered to the permitted set and
# does not leak columns the role cannot select (e.g. `status`).
- type: create_select_permission
  args:
    table: pet
    role: viewer
    permission:
      filter: {}
      columns:
      - id
      - name

- type: create_select_permission
  args:
    table: pet
    role: status_viewer
    permission:
      filter: {}
      columns:
      - status

- type: create_select_permission
  args:
    table: pet
    role: limited_viewer
    permission:
      filter: {}
      columns: '*'
      limit: 1

- type: add_inherited_role
  args:
    role_name: inherited_user
    role_set:
    - user

- type: add_inherited_role
  args:
    role_name: viewer_status
    role_set:
    - viewer
    - status_viewer

- type: create_insert_permission
  args:
    table: pet
    role: user
    permission:
      check: {}
      columns: '*'

- type: create_insert_permission
  args:
    table: pet
    role: name_inserter
    permission:
      check: {}
      columns:
      - name

- type: create_update_permission
  args:
    table: pet
    role: user
    permission:
      columns: '*'
      filter: {}
      check: {}

- type: create_update_permission
  args:
    table: pet
    role: status_updater
    permission:
      columns:
      - status
      filter: {}
      check: {}

- type: create_select_permission
  args:
    table: pet
    role: status_editor
    permission:
      filter: {}
      columns:
      - id
      - name

- type: create_update_permission
  args:
    table: pet
    role: status_editor
    permission:
      columns:
      - status
      filter: {}
      check: {}

- type: create_delete_permission
  args:
    table: pet
    role: user
    permission:
      filter: {}

- type: create_select_permission
  args:
    table: pet
    role: restricted_deleter
    permission:
      filter: {}
      columns:
      - id
      - name

- type: create_delete_permission
  args:
    table: pet
    role: restricted_deleter
    permission:
      filter: {}

- type: track_table
  args:
    schema: public
    name: order_item

- type: create_select_permission
  args:
    table: order_item
    role: user
    permission:
      filter: {}
      columns: '*'

- type: track_table
  args:
    schema: public
    name: audit_log

- type: create_insert_permission
  args:
    table: audit_log
    role: writer
    permission:
      check: {}
      columns: '*'
