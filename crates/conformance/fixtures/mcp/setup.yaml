type: bulk
args:

- type: run_sql
  args:
    sql: |
      CREATE TABLE pet (
        id INT PRIMARY KEY,
        name TEXT NOT NULL,
        status TEXT NOT NULL
      );

      INSERT INTO pet (id, name, status) VALUES
        (1, 'Rex', 'available'),
        (2, 'Milo', 'pending'),
        (3, 'Luna', 'available');

- type: track_table
  args:
    schema: public
    name: pet
    configuration:
      column_config:
        status:
          comment: Availability status of the pet

- type: create_select_permission
  args:
    table: pet
    role: user
    permission:
      filter: {}
      columns: '*'

# A column-restricted role: may select only id and name. Used to verify that
# describe_table reports columns/selectable filtered to the permitted set and
# does not leak columns the role cannot select (e.g. `status`).
- type: create_select_permission
  args:
    table: pet
    role: viewer
    permission:
      filter: {}
      columns:
      - id
      - name

- type: create_insert_permission
  args:
    table: pet
    role: user
    permission:
      check: {}
      columns: '*'

- type: create_update_permission
  args:
    table: pet
    role: user
    permission:
      columns: '*'
      filter: {}
      check: {}

- type: create_delete_permission
  args:
    table: pet
    role: user
    permission:
      filter: {}
