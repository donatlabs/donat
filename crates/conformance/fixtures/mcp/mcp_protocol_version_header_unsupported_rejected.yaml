description: >
  Streamable HTTP MCP requests with an unsupported MCP-Protocol-Version header
  are rejected at the transport boundary with HTTP 400.
url: /mcp
method: POST
status: 400
headers:
  MCP-Protocol-Version: "2024-11-05"
body:
  jsonrpc: "2.0"
  id: 88
  method: tools/list
response:
  jsonrpc: "2.0"
  id: null
  error:
    code: -32602
    message: "unsupported MCP protocol version"
