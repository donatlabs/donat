description: >
  A wide query.where boolean expression is rejected before GraphQL execution.
  MCP bounds filter breadth/amount to reduce single-request planner DoS risk.
url: /mcp
method: POST
status: 200
headers:
  X-Donat-Role: user
body:
  jsonrpc: "2.0"
  id: 52
  method: tools/call
  params:
    name: query
    arguments:
      table: pet
      columns: [id]
      where:
        _or:
        - {id: {_eq: 1000}}
        - {id: {_eq: 1001}}
        - {id: {_eq: 1002}}
        - {id: {_eq: 1003}}
        - {id: {_eq: 1004}}
        - {id: {_eq: 1005}}
