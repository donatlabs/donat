description: >
  query.table must match the GraphQL identifier pattern advertised in
  tools/list. A syntactically invalid table name is rejected at the MCP
  argument boundary before metadata lookup or GraphQL execution.
url: /mcp
method: POST
status: 200
headers:
  X-Donat-Role: user
body:
  jsonrpc: "2.0"
  id: 73
  method: tools/call
  params:
    name: query
    arguments:
      table: "1pet"
      columns: [id]
response:
  jsonrpc: "2.0"
  id: 73
  result:
    isError: true
