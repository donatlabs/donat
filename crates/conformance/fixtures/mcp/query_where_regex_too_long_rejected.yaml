description: >
  MCP bounds text/regex pattern operators before GraphQL execution. The value
  is still sent as a GraphQL variable when valid, but oversized regex-like
  patterns are rejected early to reduce expensive database pattern matching.
url: /mcp
method: POST
status: 200
headers:
  X-Donat-Role: user
body:
  jsonrpc: "2.0"
  id: 77
  method: tools/call
  params:
    name: query
    arguments:
      table: pet
      columns: [id]
      where:
        status:
          _regex: ""
response:
  jsonrpc: "2.0"
  id: 77
  result:
    isError: true
