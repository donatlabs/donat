description: >
  A GraphQL-name key in query.where that is neither a current-table column nor a
  tracked relationship is rejected before GraphQL execution.
url: /mcp
method: POST
status: 200
headers:
  X-Donat-Role: user
body:
  jsonrpc: "2.0"
  id: 78
  method: tools/call
  params:
    name: query
    arguments:
      table: pet
      columns: [id]
      where:
        imaginary_owner:
          id:
            _eq: 1
response:
  jsonrpc: "2.0"
  id: 78
  result:
    isError: true
