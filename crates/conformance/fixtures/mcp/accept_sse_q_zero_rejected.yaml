description: >
  MCP Streamable HTTP POST requests must advertise text/event-stream as an
  acceptable response type. A media range with q=0 explicitly marks it as not
  acceptable, so the request is rejected before execution.
url: /mcp
method: POST
status: 406
headers:
  Accept: "application/json, text/event-stream;q=0"
body:
  jsonrpc: "2.0"
  id: 91
  method: tools/list
response:
  jsonrpc: "2.0"
  id: null
  error:
    code: -32600
    message: "MCP accept header must include application/json and text/event-stream"
