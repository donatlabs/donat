description: >
  tools/call delete removes the rows matching the where-filter via
  delete_pet(where: $where); structuredContent holds affected_rows and the
  returning rows.
url: /mcp
method: POST
status: 200
headers:
  X-Donat-Role: user
body:
  jsonrpc: "2.0"
  id: 7
  method: tools/call
  params:
    name: delete
    arguments:
      table: pet
      where:
        id:
          _eq: 2
      returning: [id, name, status]
response:
  jsonrpc: "2.0"
  id: 7
  result:
    isError: false
    structuredContent:
      affected_rows: 1
      returning:
      - id: 2
        name: Milo
        status: pending
