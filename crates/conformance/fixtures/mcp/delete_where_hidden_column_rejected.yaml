description: >
  A role with select access only to id/name cannot use the hidden status
  column in delete.where. Otherwise affected_rows would expose a destructive
  side-channel over unreadable values.
url: /mcp
method: POST
status: 200
headers:
  X-Donat-Role: restricted_deleter
body:
  jsonrpc: "2.0"
  id: 75
  method: tools/call
  params:
    name: delete
    arguments:
      table: pet
      where:
        status:
          _eq: available
response:
  jsonrpc: "2.0"
  id: 75
  result:
    isError: true
    content:
    - type: text
      text: "'where' contains non-selectable column"
