description: >
  JSON-RPC error response codes must be integers. Fractional codes are rejected
  before the Streamable HTTP transport accepts the response envelope.
url: /mcp
method: POST
status: 400
body:
  jsonrpc: "2.0"
  id: "server-request-4"
  error:
    code: 1.5
    message: "fractional code"
response:
  jsonrpc: "2.0"
  id: null
  error:
    code: -32600
    message: "'error.code' must be a number"
