description: >
  describe_table as a role with NO permission on the table must not leak the
  schema. GraphQL introspection hides the table entirely for such a role, so
  the MCP discovery tool must refuse it too: isError:true, no columns or
  relationships disclosed. Guards against cross-role information disclosure.
url: /mcp
method: POST
status: 200
headers:
  X-Donat-Role: anonymous
body:
  jsonrpc: "2.0"
  id: 20
  method: tools/call
  params:
    name: describe_table
    arguments:
      table: pet
response:
  jsonrpc: "2.0"
  id: 20
  result:
    isError: true
    content:
    - type: text
      text: "table is not accessible"
