description: >
  tools/list bounds opaque pagination cursors so oversized cursor payloads are
  rejected at the method boundary.
url: /mcp
method: POST
status: 200
body:
  jsonrpc: "2.0"
  id: 84
  method: tools/list
  params:
    cursor: ""
response:
  jsonrpc: "2.0"
  id: 84
  error:
    code: -32602
    message: "'cursor' must be at most 512 characters"
