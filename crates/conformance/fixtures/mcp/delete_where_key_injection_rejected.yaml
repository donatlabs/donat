description: >
  A GraphQL-looking key inside delete.where is rejected before GraphQL
  execution, matching the structural validation used by the other CRUD tools.
url: /mcp
method: POST
status: 200
headers:
  X-Donat-Role: user
body:
  jsonrpc: "2.0"
  id: 43
  method: tools/call
  params:
    name: delete
    arguments:
      table: pet
      where:
        "name } query x { pet { id } }":
          _eq: Rex
response:
  jsonrpc: "2.0"
  id: 43
  result:
    isError: true
