description: >
  tools/call insert adds a row via insert_pet(objects: $objects); the
  structuredContent holds affected_rows and the returning rows.
url: /mcp
method: POST
status: 200
headers:
  X-Donat-Role: user
body:
  jsonrpc: "2.0"
  id: 5
  method: tools/call
  params:
    name: insert
    arguments:
      table: pet
      objects:
      - id: 10
        name: Biscuit
        status: available
      returning: [id, name, status]
response:
  jsonrpc: "2.0"
  id: 5
  result:
    isError: false
    structuredContent:
      affected_rows: 1
      returning:
      - id: 10
        name: Biscuit
        status: available
