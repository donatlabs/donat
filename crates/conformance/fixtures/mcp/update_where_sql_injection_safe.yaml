description: >
  tools/call update keeps SQL-looking filter values in GraphQL variables, so
  the payload is matched literally and does not widen the destructive mutation.
url: /mcp
method: POST
status: 200
headers:
  X-Donat-Role: user
body:
  jsonrpc: "2.0"
  id: 39
  method: tools/call
  params:
    name: update
    arguments:
      table: pet
      where:
        name:
          _eq: "Rex' OR '1'='1"
      set:
        status: sold
      returning: [id, name, status]
response:
  jsonrpc: "2.0"
  id: 39
  result:
    isError: false
    structuredContent:
      affected_rows: 0
      returning: []
